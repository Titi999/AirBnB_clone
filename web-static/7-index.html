<!DOCTYPE html>
<html lang="en">
  <head>
        <meta charset="utf-8">
        <title>AirBnB Clone</title>
        <link rel="stylesheet" href="styles/4-common.css">
        <link rel="stylesheet" href="styles/3-header.css">
        <link rel="stylesheet" href="styles/3-footer.css">
        <link rel="stylesheet" href="styles/6-filters.css">
        <link rel="stylesheet" href="styles/7-places.css">
        <link rel="icon" href="images/icon.png">
  </head>

  <body>
        <header></header>
        <div class="container">
            <section class="filters">
                <div class="locations">
                    <h3>States</h3>
                    <h4>California, Arizona...</h4>
                    <div class="popover">
                        <h2>California:</h2>
                        <ul>
                          <li>Abracadabra</li>
                          <li>Los Angels</li>
                        </ul>
                        <h2>Arizona</h2>
                        <ul>
                          <li>Washington</li>
                          <li>Gotham</li>
                        </ul>
                      </div>
                </div><div class="amenities">
                    <h3>Amenities</h3>
                    <h4>Internet, Kitchen...</h4>
                    <ul class="popover">
                        <li>Smart TV</li>
                        <li>Blender</li>
                        <li>Laptop</li>
                        <li>Iron</li>
                      </ul>
                </div>
                <button>Search</button>
            </section>
            <section class="places">
                <h1>Places</h1>
                <article>
                    <h2>My home</h2>
                    </article><article>
                    <h2>Tiny house</h2>
                    </article><article>
                    <h2>A suite</h2>  
                </article>
              </section>
        </div>
        <div>
        <section>
        <footer>
        Best School
        </footer>
    </section>
</div>
  </body>
</html>
